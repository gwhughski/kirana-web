<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Love Heart</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    perspective: 800px;
}

.heart {
    position: relative;
    width: 400px;
    height: 400px;
    transform-style: preserve-3d;
    animation: rotate 10s linear infinite;
}

.text {
    position: absolute;
    color: red;
    font-size: 12px;
    transform-style: preserve-3d;
    animation: glow 1.5s infinite alternate;
}

@keyframes rotate {
    0% { transform: rotateY(0deg) rotateX(10deg); }
    100% { transform: rotateY(360deg) rotateX(10deg); }
}

@keyframes glow {
    from { opacity: 0.6; }
    to { opacity: 1; text-shadow: 0 0 10px red; }
}
</style>
</head>

<body>

<div class="heart" id="heart"></div>

<script>
const heart = document.getElementById("heart");

for (let t = 0; t < Math.PI * 2; t += 0.08) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = -(13 * Math.cos(t)
        - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t)
        - Math.cos(4*t));

    let z = Math.sin(t) * 20; // efek kedalaman

    let span = document.createElement("span");
    span.className = "text";
    span.innerText = "LOVE YOU";

    span.style.left = (200 + x * 10) + "px";
    span.style.top = (200 + y * 10) + "px";
    span.style.transform = `translateZ(${z}px)`;

    heart.appendChild(span);
}
</script>

</body>
</html>
